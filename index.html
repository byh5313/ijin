<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이진이의 하루 🌸</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E07A5F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="이진이의 하루">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6EC;
    --warm: #F5E6D3;
    --peach: #F2A07B;
    --rose: #E07A5F;
    --brown: #6B4C3B;
    --dark: #3D2B1F;
    --green: #81B29A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'Nanum Gothic', sans-serif;
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--rose) 0%, var(--peach) 100%);
    padding: 40px 20px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header-emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  header h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 36px;
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    letter-spacing: -0.5px;
  }
  header p {
    color: rgba(255,255,255,0.88);
    font-size: 18px;
    margin-top: 8px;
  }

  /* NAV TABS */
  nav {
    display: flex;
    background: var(--warm);
    border-bottom: 3px solid var(--peach);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  nav button {
    flex: 1;
    padding: 18px 10px;
    border: none;
    background: transparent;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 4px solid transparent;
    margin-bottom: -3px;
  }
  nav button.active {
    color: var(--rose);
    border-bottom-color: var(--rose);
    background: var(--cream);
  }
  nav button:hover:not(.active) {
    background: rgba(242,160,123,0.15);
  }

  /* MAIN CONTENT */
  main {
    max-width: 800px;
    margin: 0 auto;
    padding: 30px 16px 60px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ADD FORM */
  .add-card {
    background: white;
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(107,76,59,0.08);
    border: 2px dashed var(--peach);
  }
  .add-card h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 16px;
  }
  .form-row {
    margin-bottom: 14px;
  }
  .form-row label {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 6px;
  }
  .form-row input[type="text"],
  .form-row input[type="date"],
  .form-row textarea {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--warm);
    border-radius: 12px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 16px;
    color: var(--dark);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .form-row input:focus,
  .form-row textarea:focus {
    border-color: var(--peach);
  }
  .form-row textarea { min-height: 100px; }

  .photo-upload-area {
    border: 2px dashed var(--peach);
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    background: var(--cream);
    cursor: pointer;
    transition: background 0.2s;
  }
  .photo-upload-area:hover { background: var(--warm); }
  .photo-upload-area p { font-size: 16px; color: var(--brown); margin-top: 8px; }
  .photo-upload-area .icon { font-size: 40px; }
  .photo-preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .photo-preview-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
  }

  .btn-add {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--rose), var(--peach));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* NOTICE CARDS */
  .notice-card {
    background: white;
    border-radius: 20px;
    padding: 24px 28px;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(107,76,59,0.08);
    border-left: 6px solid var(--green);
    animation: slideIn 0.3s ease;
    position: relative;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .notice-date {
    font-size: 15px;
    color: var(--green);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .notice-text {
    font-size: 18px;
    line-height: 1.75;
    color: var(--dark);
    white-space: pre-wrap;
  }
  .btn-delete {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .btn-delete:hover { opacity: 1; }

  /* PHOTO ALBUM */
  .album-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .album-item {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(107,76,59,0.1);
    animation: slideIn 0.3s ease;
  }
  .album-item img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
  }
  .album-caption {
    padding: 14px 16px;
  }
  .album-caption .date {
    font-size: 14px;
    color: var(--peach);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .album-caption .desc {
    font-size: 16px;
    color: var(--dark);
    line-height: 1.5;
  }
  .album-item-actions {
    padding: 0 16px 14px;
    text-align: right;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--brown);
    opacity: 0.6;
  }
  .empty-state .emoji { font-size: 60px; display: block; margin-bottom: 16px; }
  .empty-state p { font-size: 20px; }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 16px;
    object-fit: contain;
  }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 20px;
    background: white;
    border: none;
    border-radius: 50%;
    width: 48px; height: 48px;
    font-size: 24px;
    cursor: pointer;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px;
    color: var(--brown);
    opacity: 0.5;
    font-size: 15px;
  }

  /* LOCK SCREEN */
  #lockScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, var(--rose) 0%, var(--peach) 60%, #f9d4a0 100%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }
  #lockScreen .lock-emoji {
    font-size: 72px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }
  #lockScreen h2 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 32px;
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    margin-bottom: 8px;
    text-align: center;
  }
  #lockScreen p.lock-sub {
    color: rgba(255,255,255,0.85);
    font-size: 17px;
    margin-bottom: 36px;
    text-align: center;
  }
  .lock-box {
    background: white;
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.18);
  }
  .lock-box label {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 10px;
  }
  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .pin-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2.5px solid var(--peach);
    background: transparent;
    transition: background 0.15s;
  }
  .pin-dot.filled { background: var(--rose); border-color: var(--rose); }
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .numpad button {
    padding: 18px 10px;
    border: 2px solid var(--warm);
    border-radius: 14px;
    background: var(--cream);
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--dark);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .numpad button:hover { background: var(--warm); }
  .numpad button:active { transform: scale(0.95); background: var(--peach); color: white; }
  .numpad button.del { font-size: 18px; color: var(--rose); }
  .numpad button.empty { border-color: transparent; background: transparent; pointer-events: none; }
  .lock-error {
    color: var(--rose);
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    margin-top: 16px;
    min-height: 22px;
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .lock-hint {
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
    color: var(--brown);
    opacity: 0.6;
  }

  /* CHANGE PASSWORD in settings */
  .pw-setting-card {
    background: white;
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(107,76,59,0.08);
    border: 2px dashed var(--green);
  }
  .pw-setting-card h3 { font-size: 18px; font-weight: 700; color: var(--brown); margin-bottom: 16px; }

  @media (max-width: 500px) {
    header h1 { font-size: 28px; }
    .album-grid { grid-template-columns: 1fr; }
    nav button { font-size: 15px; padding: 16px 6px; }
    .photo-preview-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lockScreen">
  <div class="lock-emoji">🔒</div>
  <h2>이진이의 하루</h2>
  <p class="lock-sub">할아버지 · 할머니를 위한 특별한 공간</p>
  <div class="lock-box">
    <label>비밀번호를 입력해주세요</label>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="numpad">
      <button onclick="pinInput('1')">1</button>
      <button onclick="pinInput('2')">2</button>
      <button onclick="pinInput('3')">3</button>
      <button onclick="pinInput('4')">4</button>
      <button onclick="pinInput('5')">5</button>
      <button onclick="pinInput('6')">6</button>
      <button onclick="pinInput('7')">7</button>
      <button onclick="pinInput('8')">8</button>
      <button onclick="pinInput('9')">9</button>
      <button class="empty"></button>
      <button onclick="pinInput('0')">0</button>
      <button class="del" onclick="pinDelete()">⌫</button>
    </div>
    <div class="lock-error" id="lockError"></div>
    <div class="lock-hint" id="lockHint"></div>
  </div>
</div>

<header>
  <span class="header-emoji">🌸</span>
  <h1>이진이의 하루</h1>
  <p>할아버지 · 할머니를 위한 특별한 공간</p>
</header>

<nav>
  <button class="active" onclick="switchTab('album')">📷 사진첩</button>
  <button onclick="switchTab('notice')">📝 알림장</button>
  <button onclick="switchTab('upload')">➕ 올리기</button>
</nav>

<main>

  <!-- 사진첩 탭 -->
  <div id="tab-album" class="tab-panel active">
    <div class="section-title">📷 이진이 사진첩</div>
    <div class="album-grid" id="albumGrid"></div>
    <div class="empty-state" id="albumEmpty">
      <span class="emoji">📸</span>
      <p>아직 사진이 없어요<br>사진을 올려볼까요?</p>
    </div>
  </div>

  <!-- 알림장 탭 -->
  <div id="tab-notice" class="tab-panel">
    <div class="section-title">📝 선생님 알림장</div>
    <div id="noticeList"></div>
    <div class="empty-state" id="noticeEmpty">
      <span class="emoji">📋</span>
      <p>아직 알림장이 없어요<br>알림장을 입력해볼까요?</p>
    </div>
  </div>

  <!-- 올리기 탭 -->
  <div id="tab-upload" class="tab-panel">
    <div class="section-title">➕ 새로 올리기</div>

    <!-- 사진 올리기 -->
    <div class="add-card">
      <h3>📷 사진 올리기</h3>
      <div class="form-row">
        <label>날짜</label>
        <input type="date" id="photoDate">
      </div>
      <div class="form-row">
        <label>설명 (선택)</label>
        <input type="text" id="photoDesc" placeholder="예) 블록 놀이하는 이진이">
      </div>
      <div class="form-row">
        <label>사진 선택</label>
        <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
          <div class="icon">🖼️</div>
          <p>여기를 눌러 사진을 선택하세요<br><small style="color:#aaa">(여러 장 한번에 선택 가능 · 자동 압축됨)</small></p>
        </div>
        <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="previewPhotos(this)">
        <div class="photo-preview-grid" id="photoPreview"></div>
      </div>
      <button class="btn-add" onclick="addPhotos()">사진 저장하기 📸</button>
    </div>

    <!-- 알림장 올리기 -->
    <div class="add-card">
      <h3>📝 알림장 입력하기</h3>
      <div class="form-row">
        <label>날짜</label>
        <input type="date" id="noticeDate">
      </div>
      <div class="form-row">
        <label>알림장 내용</label>
        <textarea id="noticeText" placeholder="키즈노트 알림장 내용을 여기에 붙여넣으세요..."></textarea>
      </div>
      <button class="btn-add" onclick="addNotice()">알림장 저장하기 📋</button>
    </div>

    <!-- 비밀번호 변경 -->
    <div class="pw-setting-card">
      <h3>🔑 비밀번호 변경</h3>
      <div class="form-row">
        <label>현재 비밀번호 (4자리)</label>
        <input type="password" id="pwOld" maxlength="4" placeholder="현재 비밀번호" inputmode="numeric">
      </div>
      <div class="form-row">
        <label>새 비밀번호 (4자리)</label>
        <input type="password" id="pwNew" maxlength="4" placeholder="새 비밀번호" inputmode="numeric">
      </div>
      <div class="form-row">
        <label>새 비밀번호 확인</label>
        <input type="password" id="pwConfirm" maxlength="4" placeholder="한 번 더 입력" inputmode="numeric">
      </div>
      <button class="btn-add" onclick="changePassword()" style="background: linear-gradient(135deg,var(--green),#a8d5bb)">비밀번호 변경하기 🔑</button>
    </div>
  </div>

</main>

<footer>이진이를 사랑하는 할아버지 할머니께 💕</footer>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  // ====== 비밀번호 잠금 ======
  const DEFAULT_PW = '1234';

  let pinEntry = '';
  let lockErrorTimer = null;

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('dot' + i).classList.toggle('filled', i < pinEntry.length);
    }
  }

  function pinInput(num) {
    if (pinEntry.length >= 4) return;
    pinEntry += num;
    updateDots();
    if (pinEntry.length === 4) setTimeout(checkPin, 150);
  }

  function pinDelete() {
    pinEntry = pinEntry.slice(0, -1);
    updateDots();
  }

  async function checkPin() {
    const saved = await getSavedPw();
    if (pinEntry === saved) {
      document.getElementById('lockScreen').style.display = 'none';
      sessionStorage.setItem('ijin_unlocked', '1');
    } else {
      const errEl = document.getElementById('lockError');
      errEl.textContent = '비밀번호가 틀렸어요. 다시 입력해주세요 🙏';
      errEl.style.animation = 'none';
      void errEl.offsetWidth;
      errEl.style.animation = 'shake 0.3s ease';
      pinEntry = '';
      updateDots();
      if (lockErrorTimer) clearTimeout(lockErrorTimer);
      lockErrorTimer = setTimeout(() => { errEl.textContent = ''; }, 2000);
    }
  }

  if (sessionStorage.getItem('ijin_unlocked') === '1') {
    document.getElementById('lockScreen').style.display = 'none';
  }

  async function changePassword() {
    const oldPw = document.getElementById('pwOld').value;
    const nw = document.getElementById('pwNew').value;
    const cf = document.getElementById('pwConfirm').value;
    const saved = await getSavedPw();
    if (oldPw !== saved) { alert('현재 비밀번호가 틀렸어요!'); return; }
    if (nw.length !== 4 || !/^\d{4}$/.test(nw)) { alert('새 비밀번호는 숫자 4자리로 입력해주세요!'); return; }
    if (nw !== cf) { alert('새 비밀번호가 서로 달라요!'); return; }
    await setSavedPw(nw);
    document.getElementById('pwOld').value = '';
    document.getElementById('pwNew').value = '';
    document.getElementById('pwConfirm').value = '';
    alert('비밀번호가 변경됐어요! 🎉');
  }

  // ====== 탭 전환 ======
  function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
    renderAll();
  }

  function switchTabDirect(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    const idx = ['album','notice','upload'].indexOf(tab);
    document.querySelectorAll('nav button')[idx].classList.add('active');
    renderAll();
  }

  // ====== 날짜 포맷 ======
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('photoDate').value = today;
  document.getElementById('noticeDate').value = today;

  function fmtDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return `${y}년 ${m}월 ${day}일`;
  }

  // ====== 사진 미리보기 & 압축 ======
  let pendingPhotos = [];

  function previewPhotos(input) {
    if (!input.files || input.files.length === 0) return;
    pendingPhotos = [];
    const preview = document.getElementById('photoPreview');
    preview.innerHTML = '<div style="text-align:center;padding:20px;color:#6B4C3B;grid-column:1/-1">📸 사진 압축 중...</div>';

    Array.from(input.files).forEach((file, idx) => {
      compressImage(file, idx, preview);
    });
  }

  function compressImage(file, idx, preview) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const maxWidth = 800;
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
        canvas.width = width; canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);

        let quality = 0.7;
        let compressed = canvas.toDataURL('image/jpeg', quality);
        const targetSize = 266 * 1024;
        let attempts = 0;
        while (compressed.length > targetSize && quality > 0.1 && attempts < 10) {
          quality -= 0.1;
          compressed = canvas.toDataURL('image/jpeg', quality);
          attempts++;
        }
        if (compressed.length > targetSize && width > 400) {
          width = 600; height = (img.height * 600) / img.width;
          canvas.width = width; canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          compressed = canvas.toDataURL('image/jpeg', 0.6);
        }

        pendingPhotos[idx] = compressed;

        // 로딩 메시지 제거 후 미리보기 추가
        const loading = preview.querySelector('div');
        if (loading) loading.remove();
        const previewImg = document.createElement('img');
        previewImg.src = compressed;
        preview.appendChild(previewImg);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ====== 라이트박스 ======
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  // ====== Firebase 저장소 ======
  let _db = null;
  let _storage = null;
  let _fbReady = false;
  let _fbReadyResolvers = [];

  window.__fbInit = function(db, storage) {
    _db = db;
    _storage = storage;
    _fbReady = true;
    _fbReadyResolvers.forEach(r => r());
    _fbReadyResolvers = [];
    console.log('✅ Firebase 연결 완료!');
    initApp();
  };

  function waitFb() {
    if (_fbReady) return Promise.resolve();
    return new Promise(r => _fbReadyResolvers.push(r));
  }

  async function getData(key) {
    await waitFb();
    const { doc, getDoc } = window._firestoreFns;
    const snap = await getDoc(doc(_db, 'ijin', key));
    return snap.exists() ? snap.data().value : [];
  }

  async function setData(key, val) {
    await waitFb();
    const { doc, setDoc } = window._firestoreFns;
    await setDoc(doc(_db, 'ijin', key), { value: val });
  }

  async function getSavedPw() {
    await waitFb();
    const { doc, getDoc } = window._firestoreFns;
    try {
      const snap = await getDoc(doc(_db, 'ijin', 'password'));
      return snap.exists() ? snap.data().value : DEFAULT_PW;
    } catch { return DEFAULT_PW; }
  }

  async function setSavedPw(pw) {
    await waitFb();
    const { doc, setDoc } = window._firestoreFns;
    await setDoc(doc(_db, 'ijin', 'password'), { value: pw });
  }

  // ====== 사진 저장 ======
  async function addPhotos() {
    if (pendingPhotos.length === 0) { alert('사진을 선택해주세요!'); return; }
    try {
      const btnAdd = document.querySelector('#tab-upload .btn-add');
      btnAdd.textContent = '저장 중... ⏳';
      btnAdd.disabled = true;

      const date = document.getElementById('photoDate').value;
      const desc = document.getElementById('photoDesc').value;
      const { ref, uploadString, getDownloadURL } = window._storageFns;
      const photos = await getData('photos');

      for (let idx = 0; idx < pendingPhotos.length; idx++) {
        const src = pendingPhotos[idx];
        if (!src) continue;
        const id = Date.now() + idx;
        const storageRef = ref(_storage, `photos/${id}.jpg`);
        await uploadString(storageRef, src, 'data_url');
        const url = await getDownloadURL(storageRef);
        photos.unshift({ id, date, desc, url });
      }

      await setData('photos', photos);
      pendingPhotos = [];
      document.getElementById('photoPreview').innerHTML = '';
      document.getElementById('photoInput').value = '';
      document.getElementById('photoDesc').value = '';
      btnAdd.textContent = '사진 저장하기 📸';
      btnAdd.disabled = false;
      alert('사진이 저장됐어요! 📸');
      switchTabDirect('album');
    } catch (e) {
      alert('저장 중 오류가 발생했어요.\n오류: ' + e.message);
      const btnAdd = document.querySelector('#tab-upload .btn-add');
      if (btnAdd) { btnAdd.textContent = '사진 저장하기 📸'; btnAdd.disabled = false; }
    }
  }

  // ====== 알림장 저장 ======
  async function addNotice() {
    const text = document.getElementById('noticeText').value.trim();
    const date = document.getElementById('noticeDate').value;
    if (!text) { alert('알림장 내용을 입력해주세요!'); return; }
    const notices = await getData('notices');
    notices.unshift({ id: Date.now(), date, text });
    await setData('notices', notices);
    document.getElementById('noticeText').value = '';
    alert('알림장이 저장됐어요! 📋');
    switchTabDirect('notice');
  }

  // ====== 삭제 ======
  async function deletePhoto(id) {
    if (!confirm('이 사진을 삭제할까요?')) return;
    const photos = await getData('photos');
    try {
      const { ref, deleteObject } = window._storageFns;
      await deleteObject(ref(_storage, `photos/${id}.jpg`));
    } catch (e) { console.log('Storage 삭제 무시:', e); }
    await setData('photos', photos.filter(p => p.id !== id));
    renderAll();
  }

  async function deleteNotice(id) {
    if (!confirm('이 알림장을 삭제할까요?')) return;
    const notices = await getData('notices');
    await setData('notices', notices.filter(n => n.id !== id));
    renderAll();
  }

  // ====== 렌더링 ======
  async function renderAll() {
    await renderAlbum();
    await renderNotices();
  }

  async function renderAlbum() {
    const photos = await getData('photos');
    const grid = document.getElementById('albumGrid');
    const empty = document.getElementById('albumEmpty');
    grid.innerHTML = '';
    if (photos.length === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    photos.forEach(p => {
      const item = document.createElement('div');
      item.className = 'album-item';
      item.innerHTML = `
        <img src="${p.url || p.src}" alt="${p.desc||''}" onclick="openLightbox('${p.url || p.src}')" style="cursor:pointer">
        <div class="album-caption">
          <div class="date">${fmtDate(p.date)}</div>
          ${p.desc ? `<div class="desc">${p.desc}</div>` : ''}
        </div>
        <div class="album-item-actions">
          <button class="btn-delete" onclick="deletePhoto(${p.id})">🗑️</button>
        </div>`;
      grid.appendChild(item);
    });
  }

  async function renderNotices() {
    const notices = await getData('notices');
    const list = document.getElementById('noticeList');
    const empty = document.getElementById('noticeEmpty');
    list.innerHTML = '';
    if (notices.length === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    notices.forEach(n => {
      const card = document.createElement('div');
      card.className = 'notice-card';
      card.innerHTML = `
        <div class="notice-date">📅 ${fmtDate(n.date)}</div>
        <div class="notice-text">${n.text}</div>
        <button class="btn-delete" onclick="deleteNotice(${n.id})">🗑️</button>`;
      list.appendChild(card);
    });
  }

  // ====== 앱 초기화 (Firebase 연결 후 실행) ======
  async function initApp() {
    await renderAll();
    const pw = await getSavedPw();
    if (pw === DEFAULT_PW) {
      document.getElementById('lockHint').textContent = '※ 기본 비밀번호: 1234';
    }
  }
</script>
